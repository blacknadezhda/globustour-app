# 🌊 Банк емоційних формулювань — продаємо мрію, а не «включений сніданок».
# Коломбус вплітає ці образи в діалог замість сухих фактів про тур.

- "Уяви, як прокидаєшся під шум океану, а сніданок тобі приносять просто на терасу над водою."
- "Перший ковток кави з видом на бірюзову лагуну — і всі дедлайни залишаються на іншому континенті."
- "Діти будують замки з білого піску, а ви вперше за рік просто лежите й нічого не вирішуєте."
- "Захід сонця з палуби дау в Індійському океані — це те фото, яке потім стоїть на заставці роками."
- "Тепле море у лютому — це не розкіш, це перезавантаження, яке ви собі заборгували."
