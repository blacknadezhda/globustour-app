# 🌍 Знання напрямків — експертний капітал Globus Tour.
# Наповнюють Ніко та Вікторія. Старт — топ-5–10 напрямків, далі доповнюємо.
# Коломбус читає цей файл при старті та застосовує в кожному діалозі.

- name: Мальдіви
  for_whom: медовий місяць, пари, ювілеї, "перезавантаження" без дітей
  highlights: >
    Вілли над водою, приватність, океан кольору неонової бірюзи.
    Переліт з пересадкою, трансфер гідролітаком — вже частина пригоди.
  jtbd: романтика, статус, тиша

- name: Занзібар
  for_whom: пари та компанії друзів, хто хоче "екзотику без візи"
  highlights: >
    Білосніжні пляжі Нунгві, припливи-відпливи, спеції, черепахи.
    Прямі чартери, гарне співвідношення ціна/екзотика.
  jtbd: екзотика, фото, нові враження

- name: Єгипет
  for_whom: сім'ї з дітьми, швидкий недорогий відпочинок, дайвери
  highlights: >
    Червоне море — топ-риф світу, все включено, 4 години льоту, цілий рік сезон.
  jtbd: море взимку, все включено, бюджет

- name: Туреччина
  for_whom: сім'ї, перший закордон, "не хочу нічого вирішувати"
  highlights: >
    Найкраща інфраструктура ultra all inclusive, анімація для дітей,
    короткий переліт, без візи.
  jtbd: комфорт, діти, передбачуваність

- name: ОАЕ
  for_whom: шопінг + місто + пляж, зимове сонце, statement-подорож
  highlights: >
    Дубай — місто майбутнього, безпека, парки розваг світового рівня.
  jtbd: вау-ефект, шопінг, зима в теплі
