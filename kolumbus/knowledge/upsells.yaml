# ⬆️ Матриця апселів — що доложити до туру. Коломбус НЕ продає це клієнту сам,
# а додає підказку менеджеру в comment ліда, коли доречно.

- item: Клас перельоту (бізнес / преміум-економ)
  when: медовий місяць, ювілей, довгий переліт 8+ годин, клієнт цінує комфорт

- item: Вілла з басейном / номер з видом замість стандарту
  when: романтика, річниця, «хочемо особливе», Мальдіви/Занзібар

- item: Екскурсії та активності (сафарі-блю, острів Мнемба, пустельне сафарі)
  when: клієнт каже «хочемо вражень», компанія друзів, діти 8+

- item: Розширена страховка
  when: діти, літні батьки, активний відпочинок, дайвінг

- item: Індивідуальний трансфер
  when: нічний приліт, діти до 5 років, бізнес-клієнти
